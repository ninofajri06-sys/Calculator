<!DOCTYPE html>
<html lang="en">
<head>
    <title>Calculator Program</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a2e;
        }

        .container {
            background-color: #2e2e3e;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            width: 240px;
        }

        #display {
            width: 100%;
            height: 60px;
            background-color: #1a1a2e;
            color: #ffffff;
            font-size: 24px;
            text-align: right;
            padding: 10px;
            border: none;
            border-radius: 8px;
            margin-bottom: 16px;
            outline: none;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .btn {
            height: 50px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.1s, transform 0.1s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-number {
            background-color: #3e3e5e;
            color: #ffffff;
        }

        .btn-number:hover {
            background-color: #4e4e7e;
        }

        .btn-operator {
            background-color: #7e4e9e;
            color: #ffffff;
        }

        .btn-operator:hover {
            background-color: #9e6ebe;
        }

        .btn-equals {
            background-color: #e040fb;
            color: #ffffff;
        }

        .btn-equals:hover {
            background-color: #ea80fc;
        }

        .btn-clear {
            background-color: #cf4545;
            color: #ffffff;
        }

        .btn-clear:hover {
            background-color: #e06060;
        }

        .btn-zero {
            grid-column: span 2;
        }
    </style>
</head>
<body>
    <div class="container">
        <input type="text" id="display" placeholder="0" readonly>
        <div class="buttons">
            <button class="btn btn-clear" data-value="AC">AC</button>
            <button class="btn btn-operator" data-value="DEL">DEL</button>
            <button class="btn btn-operator" data-value="%">%</button>
            <button class="btn btn-operator" data-value="/">/</button>

            <button class="btn btn-number" data-value="7">7</button>
            <button class="btn btn-number" data-value="8">8</button>
            <button class="btn btn-number" data-value="9">9</button>
            <button class="btn btn-operator" data-value="*">*</button>

            <button class="btn btn-number" data-value="4">4</button>
            <button class="btn btn-number" data-value="5">5</button>
            <button class="btn btn-number" data-value="6">6</button>
            <button class="btn btn-operator" data-value="-">-</button>

            <button class="btn btn-number" data-value="1">1</button>
            <button class="btn btn-number" data-value="2">2</button>
            <button class="btn btn-number" data-value="3">3</button>
            <button class="btn btn-operator" data-value="+">+</button>

            <button class="btn btn-number btn-zero" data-value="0">0</button>
            <button class="btn btn-number" data-value=".">.</button>
            <button class="btn btn-equals" data-value="=">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        const buttons = document.querySelectorAll('.btn');

        buttons.forEach(button => {
            button.addEventListener('click', () => {
                const value = button.dataset.value;

                if (value === 'AC') {
                    display.value = '';
                } else if (value === 'DEL') {
                    display.value = display.value.slice(0, -1);
                } else if (value === '=') {
                    try {
                        display.value = eval(display.value);
                    } catch (e) {
                        display.value = 'Error';
                    }
                } else {
                    display.value += value;
                }
            });
        });
    </script>
</body>
</html>
